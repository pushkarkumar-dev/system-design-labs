name: Test Rust Labs

on:
  push:
    paths: ['labs/**/*.rs', 'labs/**/Cargo.toml']
  pull_request:
    paths: ['labs/**/*.rs', 'labs/**/Cargo.toml']

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        lab: [wal]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            labs/${{ matrix.lab }}/target
          key: ${{ runner.os }}-cargo-${{ matrix.lab }}-${{ hashFiles(format('labs/{0}/Cargo.toml', matrix.lab)) }}

      - name: Test ${{ matrix.lab }}
        working-directory: labs/${{ matrix.lab }}
        run: cargo test --all-features

      - name: Clippy ${{ matrix.lab }}
        working-directory: labs/${{ matrix.lab }}
        run: cargo clippy -- -D warnings
