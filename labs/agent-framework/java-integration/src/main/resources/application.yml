agent:
  base-url: http://localhost:8001      # Python agent framework server
  default-mode: function

# Spring AI — set your API key here for real LLM tool-calling (Approach B)
# Leave blank to run demo in mock mode (Approach A only)
spring:
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:demo-key-not-set}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: gpt-4o-mini

management:
  endpoints:
    web:
      exposure:
        include: health, info
