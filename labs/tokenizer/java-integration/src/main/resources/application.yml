tokenizer:
  base-url: http://localhost:8000   # Python FastAPI tokenizer server
  cache:
    max-entries: 1000               # Cache up to 1000 tokenized strings
    ttl: 10m                        # Expire entries after 10 minutes

spring:
  application:
    name: tokenizer-service

management:
  endpoint:
    health:
      show-details: always          # Show vocabSize and cacheHitRate in /actuator/health
  endpoints:
    web:
      exposure:
        include: health,info        # Expose health and info endpoints
