spring:
  application:
    name: lora-finetune-demo
  ai:
    ollama:
      base-url: http://localhost:8000   # Our Python LoRA server (when Ollama-compatible)
      chat:
        options:
          model: lora-gpt2             # Model name served by our FastAPI server

lora:
  base-url: http://localhost:8000
  max-new-tokens: 100
  temperature: 0.8
  default-adapter-path:                # Leave blank to use the server's default adapter

management:
  endpoints:
    web:
      exposure:
        include: health, info
