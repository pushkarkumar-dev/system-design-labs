gossip:
  base-url: http://localhost:8080   # Go gossip HTTP server URL
  poll-interval: PT30S              # ISO-8601: poll membership every 30 seconds
  min-live-ratio: 0.5               # UP if more than 50% of members are alive

spring:
  application:
    name: gossip-demo

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always          # Exposes memberCount, liveCount, etc.

logging:
  level:
    dev.pushkar: DEBUG
