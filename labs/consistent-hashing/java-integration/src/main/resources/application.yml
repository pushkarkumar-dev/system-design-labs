ring:
  base-url: http://localhost:8080   # Go hash ring server
  cache:
    max-entries: 5000               # Cache up to 5k routing decisions in Caffeine
    ttl: 10m                        # Expire entries after 10 minutes (manual invalidation preferred)

spring:
  application:
    name: consistent-hashing-demo
  cache:
    type: caffeine

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always          # Exposes hashRing node count and cache hit rate

logging:
  level:
    dev.pushkar: DEBUG
