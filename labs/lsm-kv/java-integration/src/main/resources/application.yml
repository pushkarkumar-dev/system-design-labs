lsm:
  base-url: http://localhost:8080   # Rust LSM KV server URL
  cache:
    max-entries: 10000              # Cache up to 10k hot keys in Caffeine
    ttl: 10m                        # Evict after 10 minutes of inactivity

spring:
  application:
    name: lsm-demo
  cache:
    type: caffeine

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always          # Exposes lsmServer l0/l1 counts + cache hit rate

logging:
  level:
    dev.pushkar: DEBUG
