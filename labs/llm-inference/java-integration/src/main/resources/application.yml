inference:
  base-url: http://localhost:8000   # Our Python FastAPI inference server
  max-tokens: 100
  temperature: 0.8
  strategy: kv_cache

spring:
  ai:
    openai:
      # Point Spring AI's OpenAI adapter at our FastAPI server.
      # Change this to https://api.openai.com to use real OpenAI.
      base-url: http://localhost:8000
      api-key: local-dummy-key       # Our server doesn't validate the API key
      chat:
        options:
          model: gpt2
    ollama:
      # Uncomment to use Ollama (local LLMs) instead:
      # base-url: http://localhost:11434
      # chat:
      #   options:
      #     model: llama3

management:
  endpoints:
    web:
      exposure:
        include: health, info
