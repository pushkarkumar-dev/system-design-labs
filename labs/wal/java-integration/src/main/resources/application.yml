wal:
  base-url: http://localhost:8080   # Rust WAL server URL
  cache:
    max-entries: 1000               # Keep last 1k appends in Caffeine
    ttl: 5m                         # Evict after 5 minutes

spring:
  application:
    name: wal-demo
  cache:
    type: caffeine

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always          # Exposes walServer details

logging:
  level:
    dev.pushkar: DEBUG
