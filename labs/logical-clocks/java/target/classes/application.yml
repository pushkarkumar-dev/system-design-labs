spring:
  application:
    name: logical-clocks-demo

server:
  port: 8081  # Use 8081 to avoid conflict with the Go server on 8080

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    dev.pushkar: INFO
