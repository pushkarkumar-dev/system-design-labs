dns-lab:
  resolver-host: 127.0.0.1
  resolver-port: 5300
  admin-url: http://localhost:5380

spring:
  application:
    name: dns-spring-integration

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    dev.pushkar.dns: INFO
