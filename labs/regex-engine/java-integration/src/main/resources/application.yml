spring:
  application:
    name: regex-jvm-perspective

regex:
  # Maximum time (ms) to allow a single pattern match to run.
  # Matches exceeding this limit are rejected (treated as potential ReDoS).
  match-timeout-ms: 100

server:
  port: 8081  # Use 8081 to avoid conflict with the Rust REPL on 8080

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info,metrics
