rag:
  base-url: http://localhost:8000        # Python RAG server (FastAPI)
  open-ai-base-url: http://localhost:8080 # OpenAI-compatible LLM endpoint
  model: local-model

spring:
  application:
    name: rag-demo

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    dev.pushkar: DEBUG
    dev.langchain4j: INFO
