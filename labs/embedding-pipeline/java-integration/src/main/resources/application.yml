embedding:
  base-url: http://localhost:8000
  default-version: stable

# Spring AI: point to our local server instead of OpenAI
# Uncomment the block below to use Spring AI abstractions (VectorStore, etc.)
# with our local embedding model:
#
# spring:
#   ai:
#     openai:
#       base-url: http://localhost:8000
#       api-key: not-needed
#       embedding:
#         options:
#           model: all-MiniLM-L6-v2

# Default (comment out the block above): Spring AI calls OpenAI
# Requires OPENAI_API_KEY environment variable
spring:
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:not-configured}

management:
  endpoints:
    web:
      exposure:
        include: health, info
