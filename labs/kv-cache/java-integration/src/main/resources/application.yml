kv-cache:
  host: localhost
  port: 6380          # Our Rust RESP server — NOT the real Redis port (6379)
  pool:
    max-active: 20    # Max connections checked out simultaneously
    max-idle: 10      # Idle connections kept warm in the pool
    timeout: 2000ms   # Connect + read timeout

spring:
  cache:
    type: redis       # Activates RedisCacheManager from CacheConfig
  data:
    redis:
      # Spring Data Redis also reads these; CacheConfig overrides them
      # programmatically via JedisConnectionFactory.
      host: ${kv-cache.host}
      port: ${kv-cache.port}

management:
  endpoint:
    health:
      show-details: always   # Show full cache + Redis status in /actuator/health
  endpoints:
    web:
      exposure:
        include: health,caches,info

logging:
  level:
    dev.pushkar.cache: INFO
    org.springframework.cache: DEBUG    # Log cache hit/miss decisions
    redis.clients.jedis: WARN
