server:
  port: 8081  # Run on 8081 to avoid conflict with Go server on 8080

spring:
  application:
    name: jwt-library-java

  security:
    oauth2:
      resourceserver:
        jwt:
          # Simpler alternative to SpringSecurityConfig.jwtDecoder():
          # Set this to a PEM file path and Spring Security does everything else.
          # Spring reads the file, extracts the RSA public key, and calls
          # NimbusJwtDecoder.withPublicKey(key).build() — same as our explicit config.
          # Uncomment this and remove the @Bean JwtDecoder in SpringSecurityConfig
          # for a zero-code RS256 resource server:
          #
          # public-key-location: classpath:keys/public.pem
          #
          # We use the explicit @Bean approach in SpringSecurityConfig.java instead,
          # so the algorithm-pinning code is visible for the lab.
          public-key-location:  # intentionally blank — see SpringSecurityConfig.java

# Application-specific JWT properties
jwt:
  # Base64-encoded DER public key (X.509/PKIX format).
  # Generate with: openssl rsa -in private.pem -pubout -outform DER | base64
  # Leave blank to use an ephemeral demo key (changes on every restart).
  rsa-public-key-base64: ""

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

logging:
  level:
    dev.pushkar.jwt: DEBUG
    org.springframework.security: INFO
