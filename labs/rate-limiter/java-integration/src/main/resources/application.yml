server:
  port: 8081   # Use 8081 so it doesn't conflict with the Go rate limiter server on 8080

rate-limiter:
  service-url: http://localhost:8080   # Go rate limiter service
  default-tier: free
  enabled: true                        # Set to false to disable for local dev

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info,metrics
