tsdb:
  base-url: http://localhost:8080   # Rust TSDB server
  push-interval: 10s                # Push metrics every 10 seconds
  batch-size: 50                    # Max inserts per publish() call

spring:
  application:
    name: tsdb-demo

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health, metrics, info
