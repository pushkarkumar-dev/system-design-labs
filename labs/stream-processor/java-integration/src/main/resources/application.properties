spring.application.name=stream-processor-demo

# Go stream processor base URL
stream-processor.base-url=http://localhost:8090
stream-processor.window-seconds=60

# Disable Kafka auto-configuration (we only use Kafka Streams for comparison, not a live cluster)
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration,\
  org.springframework.kafka.annotation.EnableKafkaStreams
