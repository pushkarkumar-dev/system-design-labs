spring:
  application:
    name: transformer-demo
  ai:
    openai:
      # Point Spring AI at our FastAPI server instead of api.openai.com.
      # The FastAPI server exposes POST /v1/chat/completions in OpenAI format —
      # Spring AI cannot tell the difference between this and the real OpenAI API.
      base-url: http://localhost:8000
      # A dummy API key — our FastAPI server doesn't validate it,
      # but Spring AI's auto-configuration requires a non-empty value.
      api-key: local
      chat:
        options:
          # Default model name sent in the request body.
          # Our FastAPI server ignores this field but logs it for debugging.
          model: gpt-local
  cache:
    type: caffeine

transformer:
  model: gpt-local
  max-tokens: 200
  temperature: 0.8
  cache:
    max-entries: 500
    ttl: 10m

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always   # Shows transformer model status in /actuator/health

logging:
  level:
    dev.pushkar: DEBUG
    org.springframework.ai: INFO
