kafka-lite:
  base-url: http://localhost:8080   # Go kafka-lite broker
  group-id: my-service
  poll-interval: 500ms
  auto-commit: false                # manual commit = at-least-once processing

spring:
  application:
    name: kafka-lite-integration

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    dev.pushkar: INFO
