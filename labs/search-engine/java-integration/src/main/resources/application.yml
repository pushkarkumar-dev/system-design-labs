search:
  base-url: http://localhost:8080   # Rust search-engine HTTP server
  default-limit: 10                 # max BM25 results per query

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always          # surface search engine connectivity in /actuator/health

spring:
  application:
    name: search-engine-demo
