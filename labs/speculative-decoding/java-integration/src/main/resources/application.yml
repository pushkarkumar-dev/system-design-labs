speculative:
  base-url: http://localhost:8000
  max-tokens: 40
  k: 5

spring:
  ai:
    openai:
      base-url: http://localhost:8000
      api-key: local-dummy-key
      chat:
        options:
          model: speculative-sim

  main:
    web-application-type: none  # run as CLI, not a web server

management:
  endpoints:
    web:
      exposure:
        include: health
