mcp:
  # stdio transport: spawns Python server as subprocess
  transport: stdio
  server-command: python3
  server-args: "-m src.example_server"
  working-dir: "labs/mcp-server"

  # HTTP transport alternative (uncomment and set transport: http)
  # transport: http
  # server-url: http://localhost:8080

spring:
  application:
    name: mcp-spring-integration
  main:
    web-application-type: none  # CLI app — no web server needed

logging:
  level:
    dev.pushkar.mcp: DEBUG
    org.springframework.ai.mcp: INFO
