feature-flags:
  service-url: http://localhost:9090   # Go feature flag server
  refresh-interval-seconds: 30         # full-refresh interval (SSE handles instant updates)
  default-enabled: false               # fail-safe: unknown flags start disabled

spring:
  application:
    name: feature-flags-demo

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    dev.pushkar.flags: DEBUG
