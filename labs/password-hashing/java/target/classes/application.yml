spring:
  application:
    name: password-hashing-demo

  # Disable default Spring Security auto-configuration for this demo.
  # We configure security explicitly in PasswordHashingConfig.
  security:
    user:
      # Demo credentials — override with environment variables in production.
      name: admin
      password: "{noop}demo-password"

server:
  port: 8090  # Avoid conflict with Go server on 8080

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

# Application-specific settings
app:
  security:
    # Pepper secret — load from AWS Secrets Manager / HashiCorp Vault in production.
    # This default is for local development only. Never commit a real pepper here.
    pepper: ${APP_PEPPER:insecure-demo-pepper-replace-in-production}

logging:
  level:
    dev.pushkar: INFO
    org.springframework.security: WARN
