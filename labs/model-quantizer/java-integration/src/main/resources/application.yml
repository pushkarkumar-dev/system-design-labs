quantizer:
  base-url: http://localhost:8000       # Python FastAPI quantizer server
  llama-server-url: http://localhost:8080  # llama.cpp REST server (optional)

spring:
  application:
    name: quantizer-demo
  ai:
    ollama:
      base-url: http://localhost:11434  # Ollama (if running a local GGUF model)
      chat:
        options:
          model: llama3

management:
  endpoint:
    health:
      show-details: always

server:
  port: 8090   # avoid conflict with quantizer (8000) and llama-server (8080)
