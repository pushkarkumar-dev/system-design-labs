spring:
  application:
    name: bytecode-vm-jvm-perspective

server:
  port: 8081   # Use 8081 to avoid conflict with any running Rust lab server

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health, info

logging:
  level:
    root: WARN
    dev.pushkar.vm: INFO
